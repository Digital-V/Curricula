<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Student Tracker</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <img src="Caleb ID.jpg">
            <h3>Dela Cruz, Juan A. | 2510123456</h3>
            <h2>Student</h2>
        </header>
        <div id="grid">
            <div class="sidebar">
                <button class="active" onclick="alert('Weekly Schedule')">Weekly Schedule</button>
                <button onclick="window.location.href='attendance_tracker.html'">Attendance Tracker</button>
                <button onclick="window.location.href='todo_list.html'">To-Do List</button>
                <button onclick="window.location.href='gwa_calculator.html'">GWA Calculator</button>
            </div>
            <div class="maintab">
                <div class="schedule-header">
                    <div class="schedule-title">Weekly Schedule</div>
                    <button class="add-course-btn" onclick="openAddModal()">+ Add Course</button>
                    <button class="clear-all-btn" onclick="clearAllCourses()">Clear All</button>
                </div>
                <div class="schedule-wrap">
                    <table class="sched-table" id="sched-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Monday</th>
                                <th>Tuesday</th>
                                <th>Wednesday</th>
                                <th>Thursday</th>
                                <th>Friday</th>
                            </tr>
                        </thead>
                        <tbody id="sched-body"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="addModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <span>Add Course</span>
                        <button class="modal-close" onclick="closeAddModal()">×</button>
                    </div>
                    <div class="modal-form">
                        <label>Course Name</label>
                        <input type="text" id="courseName" placeholder="e.g., Math 101">
                        
                        <label>Start Time</label>
                        <input type="time" id="courseTimeStart">
                        
                        <label>End Time</label>
                        <input type="time" id="courseTimeEnd">
                        
                        <label>Days (hold Ctrl to select multiple)</label>
                        <select id="courseDays" multiple>
                            <option value="0">Monday</option>
                            <option value="1">Tuesday</option>
                            <option value="2">Wednesday</option>
                            <option value="3">Thursday</option>
                            <option value="4">Friday</option>
                        </select>

                        <label>Course Type</label>
                        <div class="toggle-group">
                            <div class="toggle-option">
                                <input type="radio" id="courseMajor" name="courseType" value="major">
                                <label for="courseMajor">Major</label>
                            </div>
                            <div class="toggle-option">
                                <input type="radio" id="courseMinor" name="courseType" value="minor">
                                <label for="courseMinor">Minor</label>
                            </div>
                        </div>

                        <label>Room Number</label>
                        <input type="text" id="courseRoom" placeholder="e.g., A101, Lab 5">
                    </div>
                    <div class="modal-buttons">
                        <button class="modal-btn modal-btn-secondary" onclick="closeAddModal()">Cancel</button>
                        <button class="modal-btn modal-btn-primary" onclick="saveAddCourse()">Add Course</button>
                    </div>
                </div>
            </div>

            <div id="courseDetailModal" class="course-detail-modal">
                <div class="course-detail-content">
                    <div class="course-detail-header">
                        <span id="courseDetailName">Course Name</span>
                        <button class="course-detail-close" onclick="closeCourseDetailModal()">×</button>
                    </div>
                    <div class="course-detail-section">
                        <div class="course-detail-label">Course Type</div>
                        <div class="course-detail-value"><span id="courseDetailType" class="course-detail-badge">Major</span></div>
                    </div>
                    <div class="course-detail-section">
                        <div class="course-detail-label">Room Number</div>
                        <div class="course-detail-value" id="courseDetailRoom">—</div>
                    </div>
                    <div class="course-detail-section">
                        <div class="course-detail-label">Days</div>
                        <div class="course-detail-value" id="courseDetailDays">Monday, Wednesday, Friday</div>
                    </div>
                    <div class="course-detail-section">
                        <div class="course-detail-label">Times</div>
                        <div class="course-detail-value" id="courseDetailTimes">7:00–8:00, 9:00–10:00</div>
                    </div>
                    <button class="course-detail-delete" onclick="deleteCourse()">Delete Course</button>
                </div>
            </div>
            
        </div>

        <script>
            const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
            const TIMES = ['7:00–8:00','8:00–9:00','9:00–10:00','10:00–11:00','11:00–12:00','12:00–1:00','1:00–2:00','2:00–3:00','3:00–4:00','4:00–5:00','5:00–6:00','6:00–7:00'];

            let scheduleData = {};
            let selectedCourseName = '';

            function loadScheduleData() {
                const saved = localStorage.getItem('scheduleData');
                if (saved) {
                    scheduleData = JSON.parse(saved);
                }
            }

            loadScheduleData();

            function buildSchedule() {
                const tbody = document.getElementById('sched-body');
                tbody.innerHTML = '';
                
                const coveredCells = {};
                
                TIMES.forEach((t, timeIndex) => {
                    const tr = document.createElement('tr');
                    
                    const timeCell = document.createElement('td');
                    timeCell.textContent = t;
                    tr.appendChild(timeCell);
                    
                    DAYS.forEach((day, di) => {
                        const cellKey = `${di}-${timeIndex}`;
                        
                        if (coveredCells[cellKey]) {
                            return;
                        }
                        
                        let found = null;
                        for (const [name, info] of Object.entries(scheduleData)) {
                            if (info.times.includes(t) && info.days.includes(di)) { 
                                found = { name, info }; 
                                break; 
                            }
                        }
                        
                        const td = document.createElement('td');
                        
                        if (found) {
                            let rowspan = 1;
                            for (let i = timeIndex + 1; i < TIMES.length; i++) {
                                if (found.info.times.includes(TIMES[i])) {
                                    rowspan++;
                                } else {
                                    break;
                                }
                            }
                            
                            for (let i = 0; i < rowspan; i++) {
                                const key = `${di}-${timeIndex + i}`;
                                coveredCells[key] = true;
                            }
                            
                            td.innerHTML = `<span class="cell-block ${found.info.color}" onclick="openCourseDetailModal('${found.name}')" style="cursor: pointer;">${found.name}</span>`;
                            td.rowSpan = rowspan;
                        }
                        
                        tr.appendChild(td);
                    });
                    
                    tbody.appendChild(tr);
                });
            }

            function openAddModal() {
                document.getElementById('addModal').classList.add('show');
            }

            function closeAddModal() {
                document.getElementById('addModal').classList.remove('show');
                document.getElementById('courseName').value = '';
                document.getElementById('courseTimeStart').value = '';
                document.getElementById('courseTimeEnd').value = '';
                Array.from(document.getElementById('courseDays').options).forEach(opt => opt.selected = false);
                document.getElementById('courseRoom').value = '';
                document.querySelectorAll('input[name="courseType"]').forEach(radio => radio.checked = false);
            }

            function saveAddCourse() {
                const courseName = document.getElementById('courseName').value.trim();
                const startTimeValue = document.getElementById('courseTimeStart').value;
                const endTimeValue = document.getElementById('courseTimeEnd').value;
                const courseDaysSelect = document.getElementById('courseDays');
                const selectedDays = Array.from(courseDaysSelect.selectedOptions).map(opt => parseInt(opt.value));
                const courseType = document.querySelector('input[name="courseType"]:checked')?.value;
                const courseRoom = document.getElementById('courseRoom').value.trim();

                if (!courseName || selectedDays.length === 0) {
                    alert('Please enter a course name and select at least one day.');
                    return;
                }

                if (!startTimeValue || !endTimeValue) {
                    alert('Please select both start and end times.');
                    return;
                }

                if (!courseType) {
                    alert('Please select a course type (Major or Minor).');
                    return;
                }

                const startHour24 = parseInt(startTimeValue.split(':')[0]);
                const endHour24 = parseInt(endTimeValue.split(':')[0]);

                const matchedSlots = [];
                for (const timeSlot of TIMES) {
                    const [startPart, endPart] = timeSlot.split('\u2013').map(t => t.trim());
                    let slotStartHour = parseInt(startPart.split(':')[0]);
                    let slotEndHour = parseInt(endPart.split(':')[0]);
                    
                    if (slotStartHour <= 6 && slotStartHour !== 0) {
                        slotStartHour += 12;
                    }
                    if (slotEndHour <= 6 && slotEndHour !== 0) {
                        slotEndHour += 12;
                    } else if (slotEndHour < slotStartHour) {
                        slotEndHour += 12;
                    }
                    
                    if (slotStartHour >= startHour24 && slotEndHour <= endHour24) {
                        matchedSlots.push(timeSlot);
                    }
                }

                if (matchedSlots.length === 0) {
                    alert('No matching time slots found. Please select from the available slots (7am-7pm).');
                    return;
                }

                scheduleData[courseName] = {
                    days: selectedDays,
                    times: matchedSlots,
                    color: Math.random() > 0.5 ? 'light' : '',
                    type: courseType,
                    room: courseRoom
                };

                localStorage.setItem('scheduleData', JSON.stringify(scheduleData));
                buildSchedule();
                closeAddModal();
            }

            function openCourseDetailModal(courseName) {
                selectedCourseName = courseName;
                const course = scheduleData[courseName];
                
                if (!course) return;

                document.getElementById('courseDetailName').textContent = courseName;
                document.getElementById('courseDetailType').textContent = course.type ? course.type.toUpperCase() : 'N/A';
                document.getElementById('courseDetailRoom').textContent = course.room || '—';
                
                const dayNames = course.days.map(d => DAYS[d]).join(', ');
                document.getElementById('courseDetailDays').textContent = dayNames;
                
                const times = course.times.join(', ');
                document.getElementById('courseDetailTimes').textContent = times;
                
                document.getElementById('courseDetailModal').classList.add('show');
            }

            function closeCourseDetailModal() {
                document.getElementById('courseDetailModal').classList.remove('show');
                selectedCourseName = '';
            }

            function deleteCourse() {
                if (confirm(`Delete course "${selectedCourseName}"?`)) {
                    delete scheduleData[selectedCourseName];
                    localStorage.setItem('scheduleData', JSON.stringify(scheduleData));
                    buildSchedule();
                    closeCourseDetailModal();
                }
            }

            function clearAllCourses() {
                if (confirm('Are you sure you want to delete ALL courses? This cannot be undone.')) {
                    scheduleData = {};
                    localStorage.setItem('scheduleData', JSON.stringify(scheduleData));
                    buildSchedule();
                }
            }
            
            window.onclick = function(event) {
                const modal = document.getElementById('addModal');
                const detailModal = document.getElementById('courseDetailModal');
                if (event.target === modal) {
                    closeAddModal();
                }
                if (event.target === detailModal) {
                    closeCourseDetailModal();
                }
            }
            
            buildSchedule();
        </script>
        
    </body>
</html>
