<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Curricula // Schedule</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <div class="header-top">
                <img class="profile-img" src="" alt="Profile Image">    
                <h3></h3>
                <h2></h2>
                <button class="logout-btn" onclick="localStorage.removeItem('sessionUser'); window.location.href='login.html'">Logout</button>
            </div>
            <div id="personalInfoPanel">
                <div class="modal-content">
                    <div class="modal-header">
                        <span>Personal Information</span>
                    </div>
                    <div class="personal-panel-layout">
                        <div class="personal-photo-box">
                            <div class="personal_img_upload">
                                <label for="profileImageInput" class="personal-preview-wrap" aria-label="Change profile image">
                                    <img id="personalPreview" class="personal-preview" src="" alt="Profile preview">
                                    <span class="personal-preview-hint">+</span>
                                </label>
                                <input type="file" id="profileImageInput" accept="image/*" style="display: none;">
                            </div>
                        </div>

                        <div class="personal-form-box">
                            <div class="modal-form">
                                <label>Name: </label>
                                <input type="text" id="personalName">

                                <label>Student Number: </label>
                                <input type="text" id="personalStudentId">

                                <label>Email: </label>
                                <input type="email" id="personalEmail">

                                <label>Contact Number: </label>
                                <input type="tel" id="personalContact">

                                <label>Program: </label>
                                <input type="text" id="personalCourse">

                                <div class="two-col">
                                        <div class="col">
                                            <label>Year Level: </label>
                                            <input type="number" id="personalYearLevel" min="1" max="7" step="1">
                                        </div>
                                    <div class="col">
                                        <label>Section: </label>
                                        <input type="text" id="personalSection">
                                    </div>
                                </div>

                                <label>Status: </label>
                                <select id="personalStatus">
                                    <option value="enrolled">Regular</option>
                                    <option value="irregular">Irregular</option>
                                </select>

                                <div class="modal-buttons">
                                    <button class="modal-btn modal-btn-primary personalinfo-btn">Save</button>
                                    <button class="modal-btn modal-btn-secondary clear" onclick="clearPersonalInfo()">Clear</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </header>
        
        <div id="grid">
            <div class="sidebar">
                <button class="active" onclick="alert('Weekly Schedule')">Weekly Schedule</button>
                <button onclick="window.location.href='attendance_tracker.html'">Attendance Tracker</button>
                <button onclick="window.location.href='todo_list.html'">To-Do List</button>
                <button onclick="window.location.href='gwa-calculator.html'">GWA Calculator</button>
            </div>
            <div class="maintab">
                <div class="schedule-header">
                    <div class="schedule-title">Weekly Schedule</div>
                    <button class="add-course-btn" onclick="openAddModal()">+ Add Course</button>
                    <button class="clear-all-btn" onclick="clearAllCourses()">Clear All</button>
                </div>
                <div class="schedule-wrap">
                    <table class="sched-table" id="sched-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Monday</th>
                                <th>Tuesday</th>
                                <th>Wednesday</th>
                                <th>Thursday</th>
                                <th>Friday</th>
                                <th>Saturday</th>
                            </tr>
                        </thead>
                        <tbody id="sched-body"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="addModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <span>Add Course</span>
                        <button class="modal-close" onclick="closeAddModal()">×</button>
                    </div>
                    <div class="modal-form">
                        <label>Course Name</label>
                        <input type="text" id="courseName" placeholder="e.g., Math 101">

                        <label>Units</label>
                        <input type="number" id="courseUnits" min="1" max="6" step="1" placeholder="example: 3"> <!-- max unit is 6 ata? -->
                        
                        <label>Start Time</label>
                        <input type="time" id="courseTimeStart">
                        
                        <label>End Time</label>
                        <input type="time" id="courseTimeEnd">
                        
                        <label>Days (hold Ctrl to select multiple)</label>
                        <select id="courseDays" multiple>
                            <option value="0">Monday</option>
                            <option value="1">Tuesday</option>
                            <option value="2">Wednesday</option>
                            <option value="3">Thursday</option>
                            <option value="4">Friday</option>
                            <option value="5">Saturday</option>
                        </select>

                        <label>Semester</label> <!-- add a semester in the form -->
                        <select id="courseSemester">
                            <option value="1-1">1st Year - 1st Sem</option>
                            <option value="1-2">1st Year - 2nd Sem</option>
                            <option value="2-1">2nd Year - 1st Sem</option>
                            <option value="2-2">2nd Year - 2nd Sem</option>
                            <option value="3-1">3rd Year - 1st Sem</option>
                            <option value="3-2">3rd Year - 2nd Sem</option>
                            <option value="4-1">4th Year - 1st Sem</option>
                            <option value="4-2">4th Year - 2nd Sem</option>
                        </select>

                        <label>Course Type</label>
                        <div class="toggle-group">
                            <div class="toggle-option">
                                <input type="radio" id="courseMajor" name="courseType" value="major">
                                <label for="courseMajor">Major</label>
                            </div>
                            <div class="toggle-option">
                                <input type="radio" id="courseMinor" name="courseType" value="minor">
                                <label for="courseMinor">Minor</label>
                            </div>
                        </div>

                        <label>Room Number</label>
                        <input type="text" id="courseRoom" placeholder="e.g., A101, Lab 5">
                    </div>
                    <div class="modal-buttons">
                        <button class="modal-btn modal-btn-secondary" onclick="closeAddModal()">Cancel</button>
                        <button class="modal-btn modal-btn-primary" onclick="saveAddCourse()">Add Course</button>
                    </div>
                </div>
            </div>

            <div id="courseDetailModal" class="course-detail-modal">
                <div class="course-detail-content">
                    <div class="course-detail-header">
                        <span id="courseDetailName">Course Name</span>
                        <button class="course-detail-close" onclick="closeCourseDetailModal()">×</button>
                    </div>
                    <div class="course-detail-section">
                        <div class="course-detail-label">Course Type</div>
                        <div class="course-detail-value"><span id="courseDetailType" class="course-detail-badge">Major</span></div>
                    </div>
                    <div class="course-detail-section">
                        <div class="course-detail-label">Room Number</div>
                        <div class="course-detail-value" id="courseDetailRoom">—</div>
                    </div>
                    <div class="course-detail-section">
                        <div class="course-detail-label">Days</div>
                        <div class="course-detail-value" id="courseDetailDays">Monday, Wednesday, Friday</div>
                    </div>
                    <div class="course-detail-section">
                        <div class="course-detail-label">Times</div>
                        <div class="course-detail-value" id="courseDetailTimes">7:00–8:00, 9:00–10:00</div>
                    </div>
                    <button class="course-detail-delete" onclick="deleteCourse()">Delete Course</button>
                </div>
            </div>
        </div>
        <script src="auth.js"></script>
        <script src="personalinfo.js"></script>
        <script src="home.js"></script>
    </body>
</html>
