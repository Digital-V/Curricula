<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curricula // Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-panels">

        <div class="auth-panel" id="loginPanel">
            <div class="auth-logo">CURRICULA</div>
            <div class="auth-subtitle">Welcome back! Please login to your account.</div>

            <form class="auth-form" id="loginForm">
                <label for="loginId">Student Number</label>
                <input type="text" id="loginId" placeholder="e.g. 202412345" required>

                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>

                <button type="submit" class="auth-btn">Login</button>
            </form>

            <div class="auth-links" style="margin-top:16px;">
                <a href="#" id="forgotPasswordLink">Forgot password?</a>
            </div>
            <div class="auth-links">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>

        <div class="auth-panel hidden" id="forgotPanel">
            <div class="reset-panel-header">
                <button class="reset-back-btn" id="resetBackBtn" title="Back to login"> < </button>
                <span class="reset-panel-title">Reset Password</span>
            </div>

            <div class="auth-subtitle" style="margin-bottom:20px; text-align:left;">
                Enter your Student Number and choose a new password.
            </div>

            <div class="auth-form" id="forgotPasswordForm">
                <label for="resetId">Student Number</label>
                <input type="text" id="resetId" placeholder="e.g. 202412345">

                <label for="resetNewPassword">New Password</label>
                <input type="password" id="resetNewPassword" placeholder="Enter new password">

                <label for="resetConfirmPassword">Confirm New Password</label>
                <input type="password" id="resetConfirmPassword" placeholder="Confirm new password">

                <button type="button" class="auth-btn" id="resetSubmitBtn">Reset Password</button>
            </div>
        </div>

    </div>

    <script src="auth.js"></script>
</body>
</html>
