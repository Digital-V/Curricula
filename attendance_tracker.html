<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Student Tracker</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <div class="header-top">
                <img class="profile-img" src="" alt="Profile Image">    
                <h3></h3>
                <h2></h2>
            </div>
            <div id="personalInfoPanel">
                <div class="modal-content">
                    <div class="modal-header">
                        <span>Personal Information</span>
                    </div>
                    <div class="personal-panel-layout">
                        <div class="personal-photo-box">
                            <div class="personal_img_upload">
                                <label for="profileImageInput" class="personal-preview-wrap" aria-label="Change profile image">
                                    <img id="personalPreview" class="personal-preview" src="" alt="Profile preview">
                                    <span class="personal-preview-hint">+</span>
                                </label>
                                <input type="file" id="profileImageInput" accept="image/*" style="display: none;">
                            </div>
                        </div>

                        <div class="personal-form-box">
                            <div class="modal-form">
                                <label>Name: </label>
                                <input type="text" id="personalName">

                                <label>Student Number: </label>
                                <input type="text" id="personalStudentId">

                                <label>Email: </label>
                                <input type="email" id="personalEmail">

                                <label>Contact Number: </label>
                                <input type="tel" id="personalContact">

                                <label>Program: </label>
                                <input type="text" id="personalCourse">

                                <div class="two-col">
                                        <div class="col">
                                            <label>Year Level: </label>
                                            <input type="number" id="personalYearLevel" min="1" max="7" step="1">
                                        </div>
                                    <div class="col">
                                        <label>Section: </label>
                                        <input type="text" id="personalSection">
                                    </div>
                                </div>

                                <label>Status: </label>
                                <select id="personalStatus">
                                    <option value="enrolled">Enrolled</option>
                                    <option value="irregular">Irregular</option>
                                </select>

                                <button class="personalinfo-btn">Save</button>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </header>

        <div id="grid">
            <div class="sidebar">
                <button onclick="window.location.href='home.html'">Weekly Schedule</button>
                <button class="active" onclick="alert('Attendance Tracker')">Attendance Tracker</button>
                <button onclick="window.location.href='todo_list.html'">To-Do List</button>
                <button onclick="window.location.href='gwa_calculator.html'">GWA Calculator</button>
            </div>
            <div class="maintab">
                <div class="att-section-title">Attendance by Course</div>
                <div class="att-legend">
                    <div class="att-legend-item"><div class="att-legend-dot" style="background:#005201"></div> Present</div>
                    <div class="att-legend-item"><div class="att-legend-dot" style="background:#e57373"></div> Absent</div>
                    <div class="att-legend-item"><div class="att-legend-dot" style="background:rgba(0,82,1,0.08); border:1px solid rgba(0,82,1,0.15)"></div> No class</div>
                </div>
                <div id="att-courses"></div>
            </div>
        </div> 
    <script src="personalinfo.js"></script>
    <script src="home.js"></script>
    <script src="attendance_tracker.js"></script>
    <script src="todo_list.js"></script>             
    </body>
</html>
