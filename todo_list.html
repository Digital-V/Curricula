<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Curricula // To-Do List</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <div class="header-top">
                <img class="profile-img" src="" alt="Profile Image">    
                <h3></h3>
                <h2></h2>
            </div>
            <div id="personalInfoPanel">
                <div class="modal-content">
                    <div class="modal-header">
                        <span>Personal Information</span>
                    </div>
                    <div class="personal-panel-layout">
                        <div class="personal-photo-box">
                            <div class="personal_img_upload">
                                <label for="profileImageInput" class="personal-preview-wrap" aria-label="Change profile image">
                                    <img id="personalPreview" class="personal-preview" src="" alt="Profile preview">
                                    <span class="personal-preview-hint">+</span>
                                </label>
                                <input type="file" id="profileImageInput" accept="image/*" style="display: none;">
                            </div>
                        </div>

                        <div class="personal-form-box">
                            <div class="modal-form">
                                <label>Name: </label>
                                <input type="text" id="personalName">

                                <label>Student Number: </label>
                                <input type="text" id="personalStudentId">

                                <label>Email: </label>
                                <input type="email" id="personalEmail">

                                <label>Contact Number: </label>
                                <input type="tel" id="personalContact">

                                <label>Program: </label>
                                <input type="text" id="personalCourse">

                                <div class="two-col">
                                        <div class="col">
                                            <label>Year Level: </label>
                                            <input type="number" id="personalYearLevel" min="1" max="7" step="1">
                                        </div>
                                    <div class="col">
                                        <label>Section: </label>
                                        <input type="text" id="personalSection">
                                    </div>
                                </div>

                                <label>Status: </label>
                                <select id="personalStatus">
                                    <option value="enrolled">Regular</option>
                                    <option value="irregular">Irregular</option>
                                </select>

                                <div class="modal-buttons">
                                    <button class="modal-btn modal-btn-primary personalinfo-btn">Save</button>
                                    <button class="modal-btn modal-btn-secondary clear" onclick="clearPersonalInfo()">Clear</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </header>
        <div id="grid">
            <div class="sidebar">
                <button onclick="window.location.href='home.html'">Weekly Schedule</button>
                <button onclick="window.location.href='attendance_tracker.html'">Attendance Tracker</button>
                <button class="active" onclick="alert('To-Do List')">To-Do List</button>
                <button onclick="window.location.href='gwa_calculator.html'">GWA Calculator</button>
            </div>
            <div class="maintab todo-maintab">
                <div class="todo-title">
                    To-Do List
                    <div class="todo-counters">
                        <div class="todo-counter">
                            <div class="todo-counter-number" id="total-counter">0</div>
                            <div class="todo-counter-label">Total</div>
                        </div>
                        <div class="todo-counter">
                            <div class="todo-counter-number" id="completed-counter">0</div>
                            <div class="todo-counter-label">Completed</div>
                        </div>
                        <div class="todo-counter">
                            <div class="todo-counter-number" id="missed-counter">0</div>
                            <div class="todo-counter-label">Missed</div>
                        </div>
                    </div>
                </div>
                <div class="todo-filters">
                    <button class="todo-filter-btn active" onclick="filterTodo('all',this)">All</button>
                    <button class="todo-filter-btn" onclick="filterTodo('high',this)">High Priority</button>
                    <button class="todo-filter-btn" onclick="filterTodo('medium',this)">Medium</button>
                    <button class="todo-filter-btn" onclick="filterTodo('low',this)">Low</button>
                    <button class="todo-filter-btn" onclick="filterTodo('pending',this)">Pending</button>
                </div>
                <div class="todo-list" id="todo-list"></div>
                <div class="todo-add-form">
                    <input type="text" id="todo-text" placeholder="Task description…" />
                    <div class="todo-add-row">
                        <select id="todo-priority">
                            <option value="high">High Priority</option>
                            <option value="medium" selected>Medium Priority</option>
                            <option value="low">Low Priority</option>
                        </select>
                        <select id="todo-course"></select>
                        <input type="date" id="todo-due" />
                    </div>
                    <div class="todo-add-row">
                        <button class="todo-add-btn" onclick="addTodo()" style="width:100%">+ Add Task</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="auth.js"></script>
        <script src="personalinfo.js"></script>
        <script src="todo_list.js"></script>     
    </body>
</html>
